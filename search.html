<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Search — Serenity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="global-page-header">
    <div class="global-header-inner">
      <div class="global-header-left">
        <h1 class="page-title">Search</h1>
        <p class="page-subtitle">Find memories by words, mood, or date.</p>
      </div>
      <div class="global-header-right">
        <a href="index.html" class="icon-btn">Back</a>
      </div>
    </div>
  </header>
  <main style="padding:20px;">
    <div class="search-panel">
      <input id="searchQuery" class="search-input" type="text" placeholder="Search your diary..." />
      <button id="runSearch" class="btn btn-primary">Search</button>
    </div>
    <div class="search-results"></div>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
